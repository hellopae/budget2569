async function fetchCloud(uid) {
  try {
    const snap = await getDoc(doc(fbDb, 'budgets', uid))
    return snap.exists() ? (snap.data().data || null) : null
  } catch (e) { console.error('fetchCloud', e); return null }
}
async function pushCloud(uid, state) {

    return true
  } catch (e) { console.error('pushCloud', e); return false }

/* ══════════════════════════════════════
   CONSTANTS
══════════════════════════════════════ */
const CE_YEAR = 2026, BE_YEAR = 2569
const STORAGE_KEY = 'budget-2569-v4'
const MONTHS_TH  = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม']
const MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']
const DAY_NAMES  = ['อา','จ','อ','พ','พฤ','ศ','ส']
const DAY_FULL   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์']
const INC_CATS   = ['รายรับกิจการ','ขายสินค้า','รับชำระหนี้','มัดจำ','เงินเดือน','โบนัส','เงินได้อื่นๆ']
const EXP_CATS   = ['ต้นทุนสินค้า','ค่าใช้จ่ายกิจการ','ค่าอาหาร','ค่าน้ำมัน','Easypass','ค่าสาธารณูปโภค','ค่าของใช้','อื่นๆ']
const INC_CAT_DEFAULT = INC_CATS[0]   // 'รายรับกิจการ'
const EXP_CAT_DEFAULT = EXP_CATS[0]   // 'ต้นทุนสินค้า'

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
const genId   = () => Math.random().toString(36).slice(2) + Date.now().toString(36)
const dim     = m  => new Date(CE_YEAR, m+1, 0).getDate()
const fdow    = m  => new Date(CE_YEAR, m, 1).getDay()
const dowOf   = (m,d) => new Date(CE_YEAR, m, d).getDay()
const isWE    = (m,d) => dowOf(m,d) === 0  // อาทิตย์เท่านั้น → จ-ส เป็นค่าอาหารวันธรรมดา
// เดือนปัจจุบัน → เริ่มนับจากวันนี้ (เหลือกี่วันถึงสิ้นเดือน), เดือนอื่น → ทั้งเดือน
const _TODAY    = new Date()
const todayLabel= `${DAY_FULL[_TODAY.getDay()]}ที่ ${_TODAY.getDate()} ${MONTHS_TH[_TODAY.getMonth()]} ${_TODAY.getFullYear()+543}`
const isCurMonth= m  => (_TODAY.getFullYear()===CE_YEAR && _TODAY.getMonth()===m)
const startDay  = m  => isCurMonth(m) ? _TODAY.getDate() : 1
const remTag    = m  => isCurMonth(m) ? 'เหลือ ' : ''
// จำนวนวันปฏิทินที่เหลือในเดือน (รวมวันนี้) — เดือนอื่นคืนทั้งเดือน
const remDays   = m  => isCurMonth(m) ? (dim(m) - _TODAY.getDate() + 1) : dim(m)
// สัดส่วนของเดือนที่เหลือ (สำหรับรายจ่ายแบบเฉลี่ยทั้งเดือน เช่น ค่าน้ำมัน/Easypass)
const proRata   = m  => remDays(m) / dim(m)
// มูลค่ารายการกำหนดเองที่ "ยังต้องจ่าย" — ถ้ามี payDays (วันที่จ่าย) นับเฉพาะงวดที่ยังไม่ถึง (เฉพาะเดือนปัจจุบัน)
const custEffective = (c, m) => {
  const amt = Number(c.amount||0)
  if (!isCurMonth(m) || !Array.isArray(c.payDays) || !c.payDays.length) return amt
  const inst = amt / c.payDays.length
  return inst * c.payDays.filter(d=>Number(d)>=_TODAY.getDate()).length
}
const cntWD   = m  => { let c=0; for(let d=startDay(m);d<=dim(m);d++) if(!isWE(m,d)) c++; return c }
const cntWE   = m  => { let c=0; for(let d=startDay(m);d<=dim(m);d++) if(isWE(m,d)) c++; return c }
const fmt     = n  => Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})
const fmtDate = (m,d) => `${DAY_FULL[dowOf(m,d)]}ที่ ${d} ${MONTHS_TH[m]} ${BE_YEAR}`

const defSettings = () => ({ openingBalance:0, salary:0, foodWeekdayRate:0, foodWeekendRate:0, fuel:0, easypass:0, od:0, customItems:[] })

const normalizeState = (p) => {
  const months = {}
  for (let i=0;i<12;i++) months[i] = { settings:{...defSettings(),...(p?.months?.[i]?.settings||{})}, days:p?.months?.[i]?.days||{} }
  return { months, companies: Array.isArray(p?.companies)?p.companies:[] }
}
const loadState = () => {
  try { return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')) }
  catch { return normalizeState({}) }
}
// มีข้อมูลจริงหรือยัง (ใช้กันข้อมูลว่างทับข้อมูลจริงตอน sync)
const hasData = (s) => {
  if (!s || !s.months) return false
  if ((s.companies||[]).length>0) return true
  for (const m of Object.values(s.months)) {
    const days = m.days||{}
    if (Object.keys(days).some(k=>(days[k]||[]).length>0)) return true
    const st = m.settings||{}
    if (['openingBalance','salary','foodWeekdayRate','foodWeekendRate','fuel','easypass','od'].some(k=>Number(st[k]))) return true
    if ((st.customItems||[]).length>0) return true
  }
  return false
}
const saveState = s => localStorage.setItem(STORAGE_KEY, JSON.stringify(s))

/* ══════════════════════════════════════
   REDUCER / DISPATCH
══════════════════════════════════════ */
function applyAction(prev, action) {
  const { months } = prev
  const m = action.month
  const mo = months[m]
  const upMonth = patch => ({ ...prev, months: { ...months, [m]: { ...mo, ...patch } } })
  const upSettings = patch => upMonth({ settings: { ...mo.settings, ...patch } })

  switch(action.type) {
    case 'UPDATE_SETTINGS': return upSettings(action.settings)
    case 'ADD_CUSTOM_ITEM': return upSettings({ customItems: [...(mo.settings.customItems||[]), {...action.item, id:genId()}] })
    case 'REMOVE_CUSTOM_ITEM': return upSettings({ customItems: (mo.settings.customItems||[]).filter(c=>c.id!==action.itemId) })
    case 'UPDATE_CUSTOM_ITEM': return upSettings({ customItems: (mo.settings.customItems||[]).map(c=>c.id===action.itemId?{...c,...action.updates}:c) })
    case 'ADD_ENTRY': {
      const dk=String(action.day), ex=mo.days[dk]||[]
      return upMonth({ days:{...mo.days,[dk]:[...ex,{...action.entry,id:genId()}]} })
    }
    case 'REMOVE_ENTRY': {
      const dk=String(action.day)
      return upMonth({ days:{...mo.days,[dk]:(mo.days[dk]||[]).filter(e=>e.id!==action.entryId)} })
    }
    case 'UPDATE_ENTRY': {
      const dk=String(action.day)
      return upMonth({ days:{...mo.days,[dk]:(mo.days[dk]||[]).map(e=>e.id===action.entryId?{...e,...action.updates}:e)} })
    }
    case 'ADD_COMPANY': {
      const name=(action.name||'').trim(); if(!name) return prev
      const list=prev.companies||[]
      if(list.includes(name)) return prev
      return { ...prev, companies:[...list, name] }
    }
    case 'REMOVE_COMPANY':
      return { ...prev, companies:(prev.companies||[]).filter(c=>c!==action.name) }
    case 'RENAME_COMPANY': {
      const nn=(action.newName||'').trim(); if(!nn) return prev
      const months2={}
      for(const k in months){ const mo2=months[k], days2={}
        for(const d in mo2.days){ days2[d]=mo2.days[d].map(e=>e.companyName===action.oldName?{...e,companyName:nn}:e) }
        months2[k]={...mo2,days:days2}
      }
      const list=[...new Set((prev.companies||[]).map(c=>c===action.oldName?nn:c))]
      return { ...prev, months:months2, companies:list }
    }
    default: return prev
  }
}

/* ══════════════════════════════════════
   PRINT HELPERS
══════════════════════════════════════ */
function buildSummaryData(state, month) {
  const s = state.months[month].settings
  const allE = []
  for (const [d,entries] of Object.entries(state.months[month].days||{})) entries.forEach(e=>allE.push({...e,day:Number(d)}))
  const incE = allE.filter(e=>e.type==='income'), expE = allE.filter(e=>e.type==='expense')
  const wdays = cntWD(month), wends = cntWE(month)
  const customInc = (s.customItems||[]).filter(c=>c.type==='income')
  const customExp = (s.customItems||[]).filter(c=>c.type==='expense')
  const foodWD = Number(s.foodWeekdayRate||0)*wdays
  const foodWE = Number(s.foodWeekendRate||0)*wends
  const fuelBase = Number(s.fuel||0), easyBase = Number(s.easypass||0)
  const pr = proRata(month)
  const fuelF  = fuelBase * pr, easyF = easyBase * pr   // คิดตามสัดส่วนวันที่เหลือ
  const salF   = Number(s.salary||0)
  const odF    = Number(s.od||0)
  const totIncE = incE.reduce((a,e)=>a+Number(e.amount),0)
  const totExpE = expE.reduce((a,e)=>a+Number(e.amount),0)
  const totCustInc = customInc.reduce((a,c)=>a+custEffective(c,month),0)
  const totCustExp = customExp.reduce((a,c)=>a+custEffective(c,month),0)
  const totalInc = salF + totIncE + totCustInc
  const totalExp = foodWD + foodWE + fuelF + easyF + totExpE + totCustExp
  const net = totalInc - totalExp
  const endBal = Number(s.openingBalance||0) + net
  const grpByCat = arr => { const m={}; arr.forEach(e=>{const c=e.category||'อื่นๆ';m[c]=(m[c]||0)+Number(e.amount)}); return Object.entries(m) }
  // group by company: { company: {inc, exp} }
  const coMap = {}
  incE.forEach(e=>{ const c=e.companyName||'(ไม่ระบุบริษัท)'; (coMap[c]=coMap[c]||{inc:0,exp:0}).inc+=Number(e.amount) })
  expE.forEach(e=>{ const c=e.companyName||'(ไม่ระบุบริษัท)'; (coMap[c]=coMap[c]||{inc:0,exp:0}).exp+=Number(e.amount) })
  const coRows = Object.entries(coMap).sort((a,b)=>(b[1].inc+b[1].exp)-(a[1].inc+a[1].exp))
  return { s, wdays, wends, foodWD, foodWE, fuelF, easyF, fuelBase, easyBase, salF, odF, incE, expE, customInc, customExp,
           totIncE, totExpE, totalInc, totalExp, net, endBal, grpByCat, coRows }
}

function doPrint(state, month, mode) {
  const { s, wdays, wends, foodWD, foodWE, fuelF, easyF, salF, odF, incE, expE,
          customInc, customExp, totalInc, totalExp, net, endBal, grpByCat, coRows } = buildSummaryData(state, month)

  /* ── print CSS (inline into new window) ── */
  const CSS = `
    *{font-family:'Sarabun',sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact;box-sizing:border-box}
    body{margin:0;padding:10mm 8mm;background:white}
    @page{size:A4 portrait;margin:10mm 8mm}
    h1{margin:0}
    .hdr{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid #1e3a8a;padding-bottom:8px;margin-bottom:12px}
    .hdr h1{font-size:20px;font-weight:800;color:#1e3a8a}
    .hdr .sub{font-size:13px;color:#64748b}
    .hdr .date{font-size:10px;color:#94a3b8;text-align:right}
    /* calendar */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-head{text-align:center;font-weight:700;font-size:10px;padding:3px 1px}

    .cal-num{font-weight:700;font-size:12px;line-height:1;margin-bottom:2px}
    .entry{font-size:8.5px;line-height:1.4;padding:0}
    .entry-co{color:#1d4ed8;font-size:8px}
    .entry-cat{color:#6b7280;font-size:8px}
    .entry-desc{color:#9ca3af;font-size:8px;font-style:italic}
    /* summary */
    .section{margin-bottom:14px}
    .section-title{font-weight:700;font-size:13px;border-left:4px solid;padding-left:8px;margin-bottom:6px}
    .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
    .row.indent{padding-left:18px;font-size:11px}
    .row.bold{font-weight:700;border-top:2px solid #e5e7eb;margin-top:4px;padding-top:6px;font-size:13px}
    .box{padding:10px 14px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  `

  const today = new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})

  /* ── calendar HTML ── */
  const calHTML = () => {
    const total=dim(month), first=fdow(month)
    const cells=[...Array(first).fill(null),...Array.from({length:total},(_,i)=>i+1)]
    while(cells.length%7!==0) cells.push(null)
    const heads = DAY_NAMES.map((n,i)=>`
      <div class="cal-head" style="color:${i===0?'#ef4444':i===6?'#f97316':'#374151'};background:${i===0?'#fef2f2':i===6?'#fff7ed':'#f3f4f6'}">${n}</div>
    `).join('')
    const body = cells.map(d=>{
      if(!d) return `<div style="border:1px solid transparent;min-height:78px"></div>`
      const entries=state.months[month].days[String(d)]||[]
      const w=dowOf(month,d),isSun=w===0,isSat=w===6
      const bg=isSun?'#fef2f2':isSat?'#fff7ed':'white'
      const nc=isSun?'#ef4444':isSat?'#f97316':'#111827'
      const eHTML=entries.map(e=>`
        <div class="entry" style="color:${e.type==='income'?'#15803d':'#dc2626'}">
          <b>${e.companyName||e.category||'รายการ'}</b> ${e.type==='income'?'+':'-'}${fmt(e.amount)}
        </div>`).join('')
      return `<div class="cal-cell" style="background:${bg}"><div class="cal-num" style="color:${nc}">${d}</div>${eHTML}</div>`
    }).join('')
    return `
      <div class="hdr">
        <div><h1>📅 ปฏิทินรายรับ-รายจ่าย</h1><div class="sub">${MONTHS_TH[month]} พ.ศ. ${BE_YEAR}</div></div>
        <div class="date">พิมพ์วันที่ ${today}</div>
      </div>
      <div class="cal-grid">${heads}${body}</div>`
  }

  /* ── summary HTML ── */
  const sumHTML = () => {
    const gI=grpByCat(incE), gE=grpByCat(expE)
    const netColor=net>=0?'#15803d':'#dc2626'
    return `
      <div style="max-width:600px;margin:0 auto">
        <div class="hdr">
          <div><h1>📊 สรุปรายรับ-รายจ่าย</h1><div class="sub">${MONTHS_TH[month]} พ.ศ. ${BE_YEAR}</div></div>
          <div class="date">พิมพ์วันที่ ${today}</div>
        </div>
        <div class="section">
          <div class="section-title" style="border-color:#3b82f6;color:#1e3a8a">เงินในบัญชี</div>
          <div class="row indent"><span>เงินในบัญชี (ยกมา)</span><span style="color:#1d4ed8;font-weight:600">${fmt(s.openingBalance||0)} ฿</span></div>
          <div class="row indent"><span>วงเงิน OD (เบิกเกินบัญชี)</span><span style="color:${odF<0?'#dc2626':'#64748b'};font-weight:600">${odF<0?'-':''}${fmt(Math.abs(odF))} ฿</span></div>
        </div>
        <div class="section">
          <div class="section-title" style="border-color:#22c55e;color:#15803d">รายรับ</div>
          <div class="row indent"><span>เงินเดือน</span><span style="color:#15803d">+${fmt(salF)} ฿</span></div>
          ${customInc.map(c=>`<div class="row indent"><span>${c.name}${(c.payDays&&c.payDays.length)?` (จ่ายวันที่ ${c.payDays.join(',')})`:''}</span><span style="color:#15803d">+${fmt(custEffective(c,month))} ฿</span></div>`).join('')}
          ${gI.map(([cat,tot])=>`<div class="row indent"><span>${cat} (จากปฏิทิน)</span><span style="color:#15803d">+${fmt(tot)} ฿</span></div>`).join('')}
          <div class="row bold" style="color:#15803d"><span>รายรับรวม</span><span>+${fmt(totalInc)} ฿</span></div>
        </div>
        <div class="section">
          <div class="section-title" style="border-color:#ef4444;color:#dc2626">รายจ่าย</div>
          <div class="row indent"><span>ค่าอาหาร จ-ส (${remTag(month)}${wdays} วัน × ${fmt(s.foodWeekdayRate||0)} ฿)</span><span style="color:#dc2626">-${fmt(foodWD)} ฿</span></div>
          <div class="row indent"><span>ค่าอาหาร อา (${remTag(month)}${wends} วัน × ${fmt(s.foodWeekendRate||0)} ฿)</span><span style="color:#dc2626">-${fmt(foodWE)} ฿</span></div>
          <div class="row indent"><span>ค่าน้ำมัน${isCurMonth(month)?` (เหลือ ${remDays(month)}/${dim(month)} วัน)`:''}</span><span style="color:#dc2626">-${fmt(fuelF)} ฿</span></div>
          <div class="row indent"><span>ค่า Easypass${isCurMonth(month)?` (เหลือ ${remDays(month)}/${dim(month)} วัน)`:''}</span><span style="color:#dc2626">-${fmt(easyF)} ฿</span></div>
          ${customExp.map(c=>`<div class="row indent"><span>${c.name}${(c.payDays&&c.payDays.length)?` (จ่ายวันที่ ${c.payDays.join(',')})`:''}</span><span style="color:#dc2626">-${fmt(custEffective(c,month))} ฿</span></div>`).join('')}
          ${gE.map(([cat,tot])=>`<div class="row indent"><span>${cat} (จากปฏิทิน)</span><span style="color:#dc2626">-${fmt(tot)} ฿</span></div>`).join('')}
          <div class="row bold" style="color:#dc2626"><span>รายจ่ายรวม</span><span>-${fmt(totalExp)} ฿</span></div>
        </div>
        ${coRows.length>0?`
        <div class="section">
          <div class="section-title" style="border-color:#6366f1;color:#3730a3">สรุปตามบริษัท / ลูกค้า</div>
          <div class="row" style="font-size:11px;color:#94a3b8;font-weight:700;padding:2px 0">
            <span style="flex:1">บริษัท</span><span style="width:90px;text-align:right">รับ</span><span style="width:90px;text-align:right">จ่าย</span>
          </div>
          ${coRows.map(([co,v])=>`<div class="row indent" style="display:flex">
            <span style="flex:1">${co}</span>
            <span style="width:90px;text-align:right;color:#15803d">${v.inc>0?'+'+fmt(v.inc):'–'}</span>
            <span style="width:90px;text-align:right;color:#dc2626">${v.exp>0?'-'+fmt(v.exp):'–'}</span>
          </div>`).join('')}
        </div>`:''}
        <div class="box" style="background:${net>=0?'#dcfce7':'#fee2e2'}">
          <span style="font-weight:700;font-size:15px;color:${netColor}">${net>=0?'✅ กำไรสุทธิ':'❌ ขาดทุนสุทธิ'}</span>
          <span style="font-weight:800;font-size:20px;color:${netColor}">${fmt(Math.abs(net))} ฿</span>
        </div>
        <div class="box" style="background:#1e3a8a;color:white">
          <span style="font-weight:700;font-size:14px">ยอดเงินคงเหลือ (ปลายเดือน)</span>
          <span style="font-weight:800;font-size:20px">${fmt(endBal)} ฿</span>
        </div>
      </div>`
  }

  /* ── open new window and print ── */
  let body = ''
  if (mode==='calendar') body = calHTML()
  else if (mode==='summary') body = sumHTML()
  else body = calHTML() + `<div style="page-break-before:always;padding-top:4px">` + sumHTML() + `</div>`

  const win = window.open('','_blank','width=900,height=700')
  if (!win) { alert('กรุณาอนุญาต Popup ของ Browser เพื่อใช้งานการพิมพ์\n(ดูที่แถบที่อยู่ด้านบน แล้วกด Allow)'); return }
  win.document.write(`<!DOCTYPE html><html lang="th"><head>
    <meta charset="UTF-8">
    <title>บัญชีรายรับ-รายจ่าย ${MONTHS_TH[month]} ${BE_YEAR}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>${CSS}</style>
  </head><body>${body}<script>
    document.fonts.ready.then(function(){ setTimeout(function(){ window.print(); }, 400); });
  <\/script></body></html>`)
  win.document.close()
}

/* ══════════════════════════════════════
   MODAL BASE
══════════════════════════════════════ */
function Modal({ onClose, title, subtitle, accent='bg-gradient-to-r from-blue-800 to-blue-600', children, footer, drawer=false }) {
  const wrap = drawer
    ? 'fixed inset-0 z-50 flex items-end justify-center sm:items-stretch sm:justify-end'
    : 'fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4'
  const panel = drawer
    ? 'fade-in relative bg-white w-full sm:w-[420px] sm:max-w-none sm:h-full sm:max-h-full sm:rounded-none rounded-t-2xl shadow-2xl max-h-[92vh] flex flex-col overflow-hidden'
    : 'fade-in relative bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl shadow-2xl max-h-[92vh] flex flex-col overflow-hidden'
  return html`
    <div class="${wrap}">
      <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick=${onClose}></div>
      <div class="${panel}">
        <div class="px-5 py-4 ${accent} text-white flex-shrink-0">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-lg font-bold">${title}</div>
              ${subtitle && html`<div class="text-white/70 text-sm">${subtitle}</div>`}
            </div>
            <button onClick=${onClose} class="w-8 h-8 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 text-white text-xl transition-colors">✕</button>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto">${children}</div>
        ${footer && html`<div class="flex-shrink-0 border-t px-5 py-4 bg-white">${footer}</div>`}
      </div>
    </div>
  `
}

/* ══════════════════════════════════════
   DAY MODAL  (+ companyName field)
══════════════════════════════════════ */
function DayModal({ month, day, state, dispatch, onClose }) {
  const entries = state.months[month].days[String(day)] || []
  const weekend = isWE(month, day)
  const [showForm, setShowForm] = useState(false)
  const [eType,   setEType]   = useState('expense')
  const [cat,     setCat]     = useState(EXP_CAT_DEFAULT)
  const [custCat, setCustCat] = useState('')
  const [company, setCompany] = useState('')   // ชื่อบริษัท/ลูกค้า
  const companies = state.companies || []
  const [desc,    setDesc]    = useState('')
  const [amount,  setAmount]  = useState('')
  const [editId,  setEditId]  = useState(null)

  const totalInc = entries.filter(e=>e.type==='income').reduce((s,e)=>s+Number(e.amount),0)
  const totalExp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+Number(e.amount),0)
  const cats = eType==='income' ? INC_CATS : EXP_CATS

  const reset = () => { setShowForm(false); setEditId(null); setAmount(''); setDesc(''); setCat(EXP_CAT_DEFAULT); setCustCat(''); setCompany(''); setEType('expense') }

  const startEdit = e => {
    setEditId(e.id); setEType(e.type); setCat(e.category); setDesc(e.description||'')
    setCompany(e.companyName||''); setAmount(String(e.amount)); setCustCat(''); setShowForm(true)
  }

  const chgType = t => { setEType(t); setCat(t==='income'?INC_CAT_DEFAULT:EXP_CAT_DEFAULT); setCustCat('') }

  const effCat = () => cat==='__custom__' ? custCat : cat

  const save = () => {
    const fc = effCat(), co = company.trim()
    if (!amount || Number(amount)<=0 || (!fc && !co)) return
    const entry = { type:eType, category:fc, companyName:co, description:desc, amount:Number(amount) }
    if (editId) dispatch({ type:'UPDATE_ENTRY', month, day, entryId:editId, updates:entry })
    else        dispatch({ type:'ADD_ENTRY', month, day, entry })
    if (co) dispatch({ type:'ADD_COMPANY', name:co })
    setAmount(''); setDesc(''); setCompany(''); setEditId(null)
    setCat(eType==='income'?INC_CAT_DEFAULT:EXP_CAT_DEFAULT); setCustCat('')
  }

  const accent = weekend
    ? 'bg-gradient-to-r from-orange-600 to-orange-400'
    : 'bg-gradient-to-r from-blue-800 to-blue-600'

  return html`<${Modal} onClose=${onClose} accent=${accent} drawer=${true}
    title=${fmtDate(month, day)}
    subtitle=${totalInc>0||totalExp>0 ? html`
      ${totalInc>0?html`<span class="text-green-200">+${fmt(totalInc)} ฿ </span>`:''}
      ${totalExp>0?html`<span class="text-red-200">-${fmt(totalExp)} ฿</span>`:''}
    ` : 'ยังไม่มีรายการ'}
  >
    <div class="p-4 space-y-2">
      ${entries.length===0 && !showForm && html`
        <div class="text-center py-8 text-gray-300">
          <div class="text-4xl mb-2">📋</div>
          <div class="text-sm">ยังไม่มีรายการวันนี้</div>
        </div>
      `}

      ${entries.map(e=>html`
        <div key=${e.id} class="flex items-start gap-3 p-3 rounded-xl border fade-in ${e.type==='income'?'bg-green-50 border-green-100':'bg-red-50 border-red-100'}">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${e.type==='income'?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}">
                ${e.type==='income'?'▲ รับ':'▼ จ่าย'}
              </span>
              ${e.companyName
                ? html`<span class="text-sm font-bold text-gray-800">🏢 ${e.companyName}</span>`
                : html`<span class="text-sm font-medium text-gray-700">${e.category||''}</span>`}
            </div>
            ${e.companyName && e.category && html`<div class="text-xs text-gray-500 mt-0.5 ml-1">${e.category}</div>`}
            ${e.description && html`<div class="text-xs text-gray-400 mt-0.5 ml-1 italic">${e.description}</div>`}
          </div>
          <div class="flex items-center gap-1.5 flex-shrink-0 pt-0.5">
            <span class="font-mono font-bold text-sm ${e.type==='income'?'text-green-600':'text-red-500'}">
              ${e.type==='income'?'+':'-'}${fmt(e.amount)}
            </span>
            <button onClick=${()=>startEdit(e)} class="w-7 h-7 flex items-center justify-center rounded-full bg-blue-100 hover:bg-blue-200 text-blue-600 text-xs" title="แก้ไข">✎</button>
            <button onClick=${()=>dispatch({type:'REMOVE_ENTRY',month,day,entryId:e.id})} class="w-7 h-7 flex items-center justify-center rounded-full bg-red-100 hover:bg-red-200 text-red-500 text-xs" title="ลบ">✕</button>
          </div>
        </div>
      `)}

      ${showForm ? html`
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-200 fade-in">
          <div class="font-bold text-gray-700 mb-3 text-sm">${editId?'✎ แก้ไขรายการ':'+ เพิ่มรายการ'}</div>

          <!-- Type -->
          <div class="flex gap-2 mb-3">
            <button onClick=${()=>chgType('income')} class="flex-1 py-2 rounded-xl text-sm font-semibold transition-colors ${eType==='income'?'bg-green-500 text-white shadow-sm':'bg-white text-gray-500 border border-gray-200 hover:bg-green-50'}">▲ รายรับ</button>
            <button onClick=${()=>chgType('expense')} class="flex-1 py-2 rounded-xl text-sm font-semibold transition-colors ${eType==='expense'?'bg-red-500 text-white shadow-sm':'bg-white text-gray-500 border border-gray-200 hover:bg-red-50'}">▼ รายจ่าย</button>
          </div>

          <!-- Category -->
          <div class="mb-3">
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">หมวดหมู่</label>
            <div class="flex flex-wrap gap-1.5">
              ${cats.map(c=>html`
                <button key=${c} onClick=${()=>{setCat(c);setCustCat('')}}
                  class="px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${cat===c?(eType==='income'?'bg-green-500 text-white':'bg-red-500 text-white'):'bg-white border border-gray-200 text-gray-600 hover:border-gray-300'}">
                  ${c}
                </button>
              `)}
              <button onClick=${()=>setCat('__custom__')} class="px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${cat==='__custom__'?'bg-blue-500 text-white':'bg-white border border-gray-200 text-gray-600'}">
                + กำหนดเอง
              </button>
            </div>
            ${cat==='__custom__' && html`
              <input value=${custCat} onInput=${e=>setCustCat(e.target.value)} placeholder="ระบุหมวดหมู่"
                class="mt-2 border border-blue-300 rounded-lg px-3 py-1.5 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" autoFocus />
            `}
          </div>

          <!-- ★ Company quick-pick -->
          <div class="mb-3">
            <label class="text-xs font-semibold text-gray-500 mb-1.5 flex items-center gap-1">
              <span>🏢</span> บริษัท / ลูกค้า <span class="text-gray-300 font-normal">(เลือกหรือพิมพ์ใหม่)</span>
            </label>
            ${companies.length>0 && html`
              <div class="flex flex-wrap gap-1.5 mb-2">
                ${companies.map(c=>html`
                  <button key=${c} type="button" onClick=${()=>setCompany(company===c?'':c)}
                    class="px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${company===c?'bg-blue-600 text-white shadow-sm':'bg-white border border-gray-200 text-gray-600 hover:border-blue-300'}">
                    🏢 ${c}
                  </button>
                `)}
              </div>
            `}
            <input value=${company} onInput=${e=>setCompany(e.target.value)}
              placeholder=${companies.length>0?'หรือพิมพ์ชื่อบริษัทใหม่...':'เช่น ซิงแสงนภา, รพ.สุขสวัสดิ์, B2S'}
              class="border border-gray-200 rounded-lg px-3 py-1.5 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
            ${company.trim() && !companies.includes(company.trim()) && html`
              <div class="text-xs text-blue-400 mt-1">+ จะเพิ่ม "${company.trim()}" เข้ารายชื่อบริษัทอัตโนมัติ</div>
            `}
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">รายละเอียด <span class="text-gray-300 font-normal">(ไม่บังคับ)</span></label>
            <input value=${desc} onInput=${e=>setDesc(e.target.value)} placeholder="เช่น ข้าวกลางวัน, ค่า invoice #123"
              class="border border-gray-200 rounded-lg px-3 py-1.5 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
          </div>

          <!-- Amount -->
          <div class="mb-3">
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block">จำนวนเงิน (บาท)</label>
            <div class="relative">
              <input type="number" value=${amount} onInput=${e=>setAmount(e.target.value)}
                placeholder="0" min="0"
                class="border border-gray-200 rounded-lg px-3 py-2 w-full text-right pr-8 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-blue-300"
                autoFocus=${!editId} onKeyDown=${e=>e.key==='Enter'&&save()} />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">฿</span>
            </div>
          </div>

          <!-- Quick amounts -->
          <div class="flex gap-1 mb-4">
            ${[50,100,200,500,1000,2000,5000].map(v=>html`
              <button key=${v} onClick=${()=>setAmount(String(v))}
                class="flex-1 py-1.5 bg-white border border-gray-200 rounded-lg text-xs text-gray-600 hover:border-blue-300 hover:text-blue-600 transition-colors min-w-0">
                ${v>=1000?`${v/1000}k`:v}
              </button>
            `)}
          </div>

          <!-- Actions -->
          <div class="flex gap-2">
            <button onClick=${save} disabled=${!amount||Number(amount)<=0||(!effCat()&&!company.trim())}
              class="flex-1 py-2.5 rounded-xl font-bold text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed ${eType==='income'?'bg-green-500 hover:bg-green-600':'bg-red-500 hover:bg-red-600'}">
              ${editId?'💾 บันทึก':(eType==='income'?'+ รายรับ':'+ รายจ่าย')}
            </button>
            <button onClick=${reset} class="px-4 py-2.5 bg-gray-100 text-gray-600 rounded-xl font-medium hover:bg-gray-200 transition-colors">ยกเลิก</button>
          </div>
        </div>
      ` : html`
        <button onClick=${()=>setShowForm(true)}
          class="w-full py-3 border-2 border-dashed border-blue-200 text-blue-400 rounded-xl hover:border-blue-400 hover:text-blue-600 transition-colors font-medium text-sm">
          + เพิ่มรายการรายรับ / รายจ่าย
        </button>
      `}
    </div>
  </>`
}

/* ══════════════════════════════════════

function SettingsModal({ month, state, dispatch, onClose }) {
  const s = state.months[month].settings
  const [form, setForm] = useState({ openingBalance:s.openingBalance||0, salary:s.salary||0, foodWeekdayRate:s.foodWeekdayRate||0, foodWeekendRate:s.foodWeekendRate||0, fuel:s.fuel||0, easypass:s.easypass||0, od:s.od||0 })
  const companies = state.companies || []
  const [coNew, setCoNew] = useState('')
  const [coEdit, setCoEdit] = useState(null)
  const [coEditVal, setCoEditVal] = useState('')
  const wdays=cntWD(month), wends=cntWE(month)
  const set = (k,v) => setForm(f=>({...f,[k]:v}))

  const Field = ({label, field, hint}) => html`
    <div class="mb-4">
      <label class="text-sm font-semibold text-gray-600 mb-1 block">${label}</label>
      ${hint && html`<p class="text-xs text-gray-400 mb-1">${hint}</p>`}
      <div class="relative">
        <input type="number" value=${form[field]} onInput=${e=>set(field,e.target.value)}
          class="border border-gray-200 rounded-lg px-3 py-2 w-full text-right pr-8 focus:outline-none focus:ring-2 focus:ring-blue-300" min="0" />
        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">฿</span>
      </div>
    </div>

  return html`<${Modal} onClose=${onClose} title="⚙️ ตั้งค่าเดือน ${MONTHS_TH[month]}" subtitle="พ.ศ. ${BE_YEAR}"
    footer=${html`<div class="flex gap-3">
      <button onClick=${onClose} class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-semibold hover:bg-gray-200">ยกเลิก</button>
      <button onClick=${save} class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-sm">💾 บันทึก</button>
    </div>`}
  >
    <div class="px-5 py-4">
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-5">
        <div class="text-sm font-semibold text-blue-700 mb-2">ตัวอย่างสรุปเดือนนี้</div>
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div class="bg-green-100 rounded-lg p-2 text-center"><div class="text-green-600 font-bold">+${fmt(preview.inc)} ฿</div><div class="text-xs text-green-500">รายรับ</div></div>

        </div>
        <div class="p-2 rounded-lg text-center text-sm font-bold ${net>=0?'bg-green-200 text-green-700':'bg-red-200 text-red-600'}">
          ${net>=0?'✅ กำไร':'❌ ขาดทุน'} ${fmt(Math.abs(net))} ฿
        </div>
      </div>
      <div class="font-bold text-gray-700 mb-3 flex items-center gap-2"><span class="w-2 h-2 bg-blue-500 rounded-full inline-block"></span> ยอดเงินยกมา</div>
      ${Field({label:'เงินในบัญชี (ยกมา)', field:'openingBalance', hint:'ยอดเงินคงเหลือจากเดือนก่อน'})}
      <div class="mb-5">
        <label class="text-sm font-semibold text-gray-600 mb-1 block">วงเงิน OD (เบิกเกินบัญชี)</label>
        <p class="text-xs text-gray-400 mb-1">ใส่ค่าติดลบได้ เช่น -955415</p>

          <input type="number" value=${form.od} onInput=${e=>set('od',e.target.value)}

/* ══════════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════════ */
function CalendarView({ month, state, onDayClick }) {
  const total = dim(month), first = fdow(month)
  const cells = [...Array(first).fill(null), ...Array.from({length:total},(_,i)=>i+1)]
  while(cells.length%7!==0) cells.push(null)

  return html`
    <div class="bg-white rounded-xl shadow-sm p-3">
      <div class="grid grid-cols-7 mb-1">
        ${DAY_NAMES.map((n,i)=>html`
          <div key=${i} class="text-center text-xs font-bold py-1.5 ${i===0?'text-red-500':i===6?'text-orange-500':'text-gray-400'}">${n}</div>
        `)}
      </div>
      <div class="grid grid-cols-7 gap-1">
        ${cells.map((d,i)=>{
          if(!d) return html`<div key=${i} class="min-h-[80px]"></div>`
          const entries = state.months[month].days[String(d)] || []
          const w=dowOf(month,d), isSun=w===0, isSat=w===6
          const isToday = isCurMonth(month) && d===_TODAY.getDate()
          const MAXROWS = 5
          return html`
            <button key=${i} onClick=${()=>onDayClick(d)}
              class="day-cell relative border rounded-xl p-1 text-left min-h-[80px] flex flex-col
                ${isToday?'bg-blue-50 border-blue-400 ring-2 ring-blue-500':(isSun?'bg-red-50 border-red-100':isSat?'bg-orange-50 border-orange-100':'bg-white border-gray-100')}
                ${!isToday&&entries.length>0?'ring-1 '+(isSun?'ring-red-200':isSat?'ring-orange-200':'ring-blue-100'):''}">
              <div class="flex items-center justify-between mb-0.5 px-0.5">
                <span class="text-sm font-bold leading-none ${isToday?'text-white bg-blue-600 rounded-full w-5 h-5 flex items-center justify-center':(isSun?'text-red-500':isSat?'text-orange-500':'text-gray-700')}">${d}</span>
                ${isToday?html`<span class="font-extrabold text-blue-700 bg-blue-200 rounded px-1" style="font-size:8px">วันนี้</span>`:''}
              </div>
              <div class="flex flex-col gap-px overflow-hidden">
                ${entries.slice(0,MAXROWS).map(e=>html`
                  <div key=${e.id} class="leading-tight mb-0.5 ${e.type==='income'?'text-green-600':'text-red-500'}">
                    <div class="truncate font-medium" style="font-size:9px;line-height:1.15">${e.companyName||e.category||'รายการ'}</div>
                    <div class="font-bold truncate" style="font-size:10px;line-height:1.15">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
                  </div>
                `)}
                ${entries.length>MAXROWS && html`<div class="text-gray-400 font-medium" style="font-size:9px">+${entries.length-MAXROWS} รายการ…</div>`}
              </div>
            </button>
          `
        })}
      </div>
      <div class="mt-3 pt-2 border-t flex gap-4 text-xs text-gray-400 flex-wrap">
        <span class="flex items-center gap-1"><span class="font-bold text-green-600">ชื่อ +ยอด</span> = รายรับ</span>
        <span class="flex items-center gap-1"><span class="font-bold text-red-500">ชื่อ -ยอด</span> = รายจ่าย</span>
        <span class="text-gray-400">แตะวันเพื่อดู/เพิ่มรายการ</span>
        <span class="text-red-400">อา</span><span class="text-orange-400">ส</span>
      </div>
    </div>
  `
}

/* ══════════════════════════════════════
   CUSTOM ITEM ROW (module scope — กัน focus หลุดตอนพิมพ์)
══════════════════════════════════════ */
function CustomRow({ item, month, dispatch }) {
  const [ed,setEd]=useState(false), [n,setN]=useState(item.name), [a,setA]=useState(String(item.amount))
  const [pd,setPd]=useState((item.payDays||[]).join(','))
  const save=()=>{
    const payDays=[...new Set(pd.split(',').map(x=>parseInt(x.trim(),10)).filter(x=>x>=1&&x<=31))].sort((x,y)=>x-y)
    dispatch({type:'UPDATE_CUSTOM_ITEM',month,itemId:item.id,updates:{name:n,amount:Number(a)||0,payDays}}); setEd(false)
  }
  if(ed) return html`
    <div class="flex flex-wrap items-center gap-1.5 pl-5 py-1.5">
      <span class="text-gray-200">└</span>
      <input value=${n} onInput=${e=>setN(e.target.value)} placeholder="ชื่อ" class="border border-blue-400 rounded px-2 py-0.5 text-sm w-28 focus:outline-none" autoFocus />
      <input type="number" value=${a} onInput=${e=>setA(e.target.value)} placeholder="จำนวน" class="border border-blue-400 rounded px-2 py-0.5 w-24 text-right text-sm focus:outline-none" />
      <span class="text-xs text-gray-400">฿</span>
      <input value=${pd} onInput=${e=>setPd(e.target.value)} placeholder="วันจ่าย เช่น 1,16" title="เว้นว่าง = จ่ายเต็มทั้งเดือน" class="border border-gray-300 rounded px-2 py-0.5 text-sm w-32 focus:outline-none" />
      <button onClick=${save} class="text-xs px-1.5 py-1 bg-green-500 text-white rounded">✓</button>
      <button onClick=${()=>setEd(false)} class="text-xs px-1.5 py-1 bg-red-400 text-white rounded">✕</button>
    </div>
  `
  const eff = custEffective(item, month)
  const hasSched = Array.isArray(item.payDays) && item.payDays.length
  const remCount = hasSched ? item.payDays.filter(d=>Number(d)>=_TODAY.getDate()).length : 0
  return html`
    <div class="flex items-center justify-between py-1.5 pl-5">
      <span class="text-sm text-gray-700 flex items-center gap-1.5 flex-wrap">
        <span class="text-gray-200">└</span>${item.name}
        ${hasSched?html`<span class="text-xs text-gray-400">(จ่ายวันที่ ${item.payDays.join(',')}${isCurMonth(month)?` · เหลือ ${remCount}/${item.payDays.length} งวด`:''})</span>`:''}
        <button onClick=${()=>setEd(true)} class="text-gray-300 hover:text-blue-500 text-xs">✎</button>
        <button onClick=${()=>dispatch({type:'REMOVE_CUSTOM_ITEM',month,itemId:item.id})} class="text-gray-300 hover:text-red-500 text-xs">✕</button>
      </span>
      <span class="font-mono text-sm ${item.type==='income'?'text-green-600':'text-red-500'}">
        ${item.type==='income'?'+':'-'}${fmt(eff)} ฿
      </span>
    </div>
  `
}

══════════════════════════════════════ */
function LoginScreen() {
  const [mode, setMode] = useState('login')   // 'login' | 'signup'
  const [email, setEmail] = useState('')
  const [pw, setPw] = useState('')
  const [busy, setBusy] = useState(false)
  const [msg, setMsg] = useState('')

  const submit = async () => {
    if (!email.trim() || !pw) { setMsg('กรุณากรอกอีเมลและรหัสผ่าน'); return }
    setBusy(true); setMsg('')
    try {
      if (mode==='login') await signInWithEmailAndPassword(fbAuth, email.trim(), pw)
      else                await createUserWithEmailAndPassword(fbAuth, email.trim(), pw)
      // สำเร็จ → onAuthStateChanged จะพาเข้าแอปเอง
    } catch (e) {
      const map = {
        'auth/invalid-credential':'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
        'auth/invalid-email':'รูปแบบอีเมลไม่ถูกต้อง',
        'auth/weak-password':'รหัสผ่านสั้นเกินไป (อย่างน้อย 6 ตัว)',
        'auth/email-already-in-use':'อีเมลนี้มีบัญชีแล้ว ลองเข้าสู่ระบบ',
        'auth/user-not-found':'ไม่พบบัญชีนี้ ลองสมัครใหม่'
      }
      setMsg('⚠️ ' + (map[e.code] || e.message))
    }
    setBusy(false)
  }

  return html`
    <div class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-blue-600 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
        <div class="text-center mb-5">
          <div class="text-4xl mb-2">💰</div>
          <div class="text-xl font-bold text-gray-800">บัญชีรายรับ-รายจ่าย</div>
          <div class="text-sm text-gray-400">เข้าสู่ระบบเพื่อ sync ข้อมูลทุกเครื่อง</div>
        </div>
        <div class="flex gap-2 mb-4 bg-gray-100 rounded-xl p-1">
          <button onClick=${()=>{setMode('login');setMsg('')}} class="flex-1 py-2 rounded-lg text-sm font-semibold transition-colors ${mode==='login'?'bg-white text-blue-700 shadow-sm':'text-gray-500'}">เข้าสู่ระบบ</button>
          <button onClick=${()=>{setMode('signup');setMsg('')}} class="flex-1 py-2 rounded-lg text-sm font-semibold transition-colors ${mode==='signup'?'bg-white text-blue-700 shadow-sm':'text-gray-500'}">สมัครใหม่</button>
        </div>
        <label class="text-xs font-semibold text-gray-500 mb-1 block">อีเมล</label>
        <input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="you@email.com"
          class="border border-gray-200 rounded-lg px-3 py-2 w-full text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-300" />
        <label class="text-xs font-semibold text-gray-500 mb-1 block">รหัสผ่าน</label>
        <input type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="อย่างน้อย 6 ตัวอักษร"
          class="border border-gray-200 rounded-lg px-3 py-2 w-full text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-300"
          onKeyDown=${e=>e.key==='Enter'&&submit()} />
        ${msg && html`<div class="text-sm mb-3 ${msg.startsWith('✅')?'text-green-600':'text-red-500'}">${msg}</div>`}
        <button onClick=${submit} disabled=${busy}
          class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-sm disabled:opacity-50">
          ${busy ? 'กำลังดำเนินการ...' : (mode==='login' ? '🔓 เข้าสู่ระบบ' : '✨ สมัครสมาชิก')}
        </button>
      </div>
    </div>
  `
}

function App() {
  const [state,   setState]   = useState(loadState)
  const [month,   setMonth]   = useState(() => new Date().getMonth())
  const [selDay,  setSelDay]  = useState(null)
  const [showSettings, setShowSettings] = useState(false)
  const [showPrint,    setShowPrint]    = useState(false)
  const [activeTab,    setActiveTab]    = useState('calendar')

  // ── Cloud auth/sync state ──
  const [session,   setSession]   = useState(null)
  const [authReady, setAuthReady] = useState(!cloudEnabled)   // ไม่มี cloud → พร้อมทันที (offline)
  const [cloud,     setCloud]     = useState('idle')      // idle|saving|saved|error
  const saveTimer = useRef(null)

  // ฟังสถานะ login ของ Firebase
  useEffect(() => {
    if (!cloudEnabled) return
    const unsub = onAuthStateChanged(fbAuth, (u) => { setSession(u); setAuthReady(true) })
    return unsub
  }, [])

  // เมื่อ login แล้ว → ดึงข้อมูลจาก cloud (หรือดันข้อมูลเครื่องนี้ขึ้นถ้า cloud ว่าง)
  useEffect(() => {
    if (!cloudEnabled || !session) return
    let cancelled = false
    ;(async () => {
      const cloudData = await fetchCloud(session.uid)
      if (cancelled) return
      if (cloudData && hasData(cloudData)) {
        const norm = normalizeState(cloudData)   // cloud มีข้อมูลจริง → ใช้ของ cloud
        setState(norm); saveState(norm); setCloud('saved')
      } else if (hasData(state)) {
        const ok = await pushCloud(session.uid, state)   // cloud ว่าง แต่เครื่องนี้มีข้อมูล → ดันขึ้น
        setCloud(ok ? 'saved' : 'error')
      } else {
        setCloud('saved')   // ว่างทั้งคู่ ไม่ต้องทำอะไร
      }
    })()
    // เปิดสลับหน้าต่าง/กลับมาที่แอป → ดึงข้อมูลล่าสุดจาก cloud (เฉพาะถ้า cloud มีข้อมูลจริง)
    const onFocus = async () => {
      const c = await fetchCloud(session.uid)
      if (c && hasData(c)) { const n = normalizeState(c); setState(n); saveState(n) }
    }
    window.addEventListener('focus', onFocus)
    return () => { cancelled = true; window.removeEventListener('focus', onFocus) }
  }, [session])

  const dispatch = useCallback((action) => {
    setState(prev => {
      const next = applyAction(prev, action)
      saveState(next)
      if (cloudEnabled && session) {
        setCloud('saving')
        clearTimeout(saveTimer.current)
        saveTimer.current = setTimeout(async () => {
          const ok = await pushCloud(session.uid, next)
          setCloud(ok ? 'saved' : 'error')
        }, 700)
      }
      return next
    })
  }, [session])

  const logout = async () => { if (cloudEnabled) { await signOut(fbAuth); setCloud('idle') } }

  // ยังโหลด session ไม่เสร็จ
  if (cloudEnabled && !authReady) return html`<div class="min-h-screen flex items-center justify-center text-gray-400">กำลังโหลด...</div>`
  // มี cloud แต่ยังไม่ login → หน้า login
  if (cloudEnabled && !session) return html`<${LoginScreen} />`

  const cloudBadge = !cloudEnabled
    ? html`<span class="text-amber-200 text-xs hidden sm:inline" title="ยังไม่ได้ตั้งค่า cloud — ข้อมูลเก็บในเครื่องนี้เท่านั้น">⚠ offline</span>`
    : html`<span class="text-xs hidden sm:inline ${cloud==='error'?'text-red-300':'text-blue-200'}">${cloud==='saving'?'⏳ กำลังบันทึก...':cloud==='error'?'⚠ sync ล้มเหลว':'☁️ ซิงค์แล้ว'}</span>`

  return html`
    <div class="min-h-screen bg-slate-100">
      <!-- Header -->
      <header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white shadow-lg no-print">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="text-2xl">💰</span>
            <div>
              <div class="text-lg font-bold leading-tight">บัญชีรายรับ-รายจ่าย</div>
              <div class="text-blue-300 text-xs">ปี พ.ศ. ${BE_YEAR}</div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            ${cloudBadge}
            <!-- Print / PDF Button -->
            <button onClick=${()=>setShowPrint(true)}
              class="flex items-center gap-1.5 bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg text-sm transition-colors border border-white/20">
              🖨️ <span class="hidden sm:inline">พิมพ์/PDF</span>
            </button>
            <button onClick=${()=>setShowSettings(true)}
              class="flex items-center gap-1.5 bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg text-sm transition-colors">
              ⚙️ <span class="hidden sm:inline">ตั้งค่า</span>
            </button>
            ${cloudEnabled && session && html`
              <button onClick=${logout} title="ออกจากระบบ (${session.email})"
                class="flex items-center gap-1.5 bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg text-sm transition-colors">
                🚪 <span class="hidden sm:inline">ออก</span>
              </button>
            `}
          </div>
        </div>
      </header>

      <!-- Month Nav -->
      <div class="bg-blue-700 text-white no-print">
        <div class="max-w-4xl mx-auto px-4 py-2 flex items-center justify-between">
          <button onClick=${()=>setMonth(m=>Math.max(0,m-1))} disabled=${month===0}
            class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-blue-600 disabled:opacity-25 disabled:cursor-not-allowed transition-colors text-xl">‹</button>
          <div class="text-center">
            <div class="text-xl font-bold">${MONTHS_TH[month]}</div>
            <div class="text-blue-300 text-xs">พ.ศ. ${BE_YEAR}</div>
          </div>
          <button onClick=${()=>setMonth(m=>Math.min(11,m+1))} disabled=${month===11}
            class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-blue-600 disabled:opacity-25 disabled:cursor-not-allowed transition-colors text-xl">›</button>
        </div>
        <div class="max-w-4xl mx-auto px-4 pb-2 overflow-x-auto">
          <div class="flex gap-1 min-w-max">
            ${MONTHS_SHORT.map((m,i)=>html`
              <button key=${i} onClick=${()=>setMonth(i)}
                class="px-2 py-0.5 rounded text-xs transition-colors ${month===i?'bg-white text-blue-700 font-bold':'text-blue-300 hover:text-white hover:bg-blue-600'}">
                ${m}
              </button>
            `)}
          </div>
        </div>
      </div>

      <!-- Tabs + Print shortcut -->
      <div class="max-w-4xl mx-auto px-4 mt-4 mb-3 no-print">
        <div class="flex items-center justify-between gap-2">
          <div class="flex gap-2">
            <button onClick=${()=>setActiveTab('calendar')}
              class="px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${activeTab==='calendar'?'bg-blue-600 text-white shadow-sm':'bg-white text-gray-500 hover:bg-gray-50'}">
              📅 ปฏิทิน
            </button>
            <button onClick=${()=>setActiveTab('summary')}
              class="px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${activeTab==='summary'?'bg-blue-600 text-white shadow-sm':'bg-white text-gray-500 hover:bg-gray-50'}">
              📊 สรุปรายเดือน
            </button>
          </div>
          <!-- Quick print for current tab -->
          <button onClick=${()=>doPrint(state, month, activeTab==='calendar'?'calendar':'summary')}
            title="พิมพ์หน้านี้"
            class="flex items-center gap-1.5 px-3 py-2 bg-white text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-xl text-sm font-medium border border-gray-200 hover:border-blue-200 transition-all">
            🖨️ <span class="hidden sm:inline">พิมพ์หน้านี้</span>
          </button>
        </div>
      </div>

      <!-- Content -->
      <main class="max-w-4xl mx-auto px-4 pb-8">
        ${activeTab==='calendar'
          ? html`<${CalendarView} month=${month} state=${state} onDayClick=${setSelDay} />`
          : html`<${MonthlySummary} month=${month} state=${state} dispatch=${dispatch} />`
        }
      </main>

      <!-- Modals -->
      ${selDay!==null && html`<${DayModal} month=${month} day=${selDay} state=${state} dispatch=${dispatch} onClose=${()=>setSelDay(null)} />`}
      ${showSettings && html`<${SettingsModal} month=${month} state=${state} dispatch=${dispatch} onClose=${()=>setShowSettings(false)} />`}
      ${showPrint    && html`<${PrintModal} month=${month} state=${state} onClose=${()=>setShowPrint(false)} />`}
    </div>
  `
}

render(html`<${App} />`, document.getElementById('app'))
</script>
</body>
</html>
